<!DOCTYPE html>
<html>
<head>
    <title>🔥 RealSpoof Pro - Live Calls</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <script src="https://unpkg.com/sip.js@0.21.2/dist/sip.min.js"></script>
    <style>
        body { margin: 0; font-family: system-ui; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .app { background: #111; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px #000; max-width: 400px; width: 90%; }
        h1 { text-align: center; margin-bottom: 20px; color: #ff4757; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .connect { background: #2ed573; color: #000; font-weight: bold; }
        .call { background: #ff4757; color: #fff; font-weight: bold; }
        .end { background: #ff6348; color: #fff; }
        .status { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin: 10px 0; }
        .success { background: #2ed573; color: #000; }
        .calling { background: #ffa502; color: #000; animation: blink 1s infinite; }
        .error { background: #ff4757; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="app">
        <h1>🔥 RealSpoof Pro</h1>
        
        <div id="account" style="display:none;">
            <small>SIP: <span id="sipUser"></span>@sip2sip.info</small>
        </div>
        
        <input id="spoofID" type="tel" placeholder="Spoof Number (+919876543210)" value="+919876543210">
        <input id="targetID" type="tel" placeholder="Target Number (+919XXXXXXXXX)">
        
        <button class="connect" onclick="connectSIP()">🔗 Connect SIP</button>
        <button class="call" id="callBtn" onclick="makeCall()" disabled>🚀 Make Spoof Call</button>
        <button class="end" id="endBtn" onclick="endCall()" disabled>📞 End Call</button>
        
        <div id="status" class="status">Connect SIP first!</div>
    </div>

    <script>
        let ua, session;
        const SIP_CONFIG = {
            server: 'sip2sip.info',
            user: 'autospf' + Math.floor(Math.random()*10000),  // Random user
            pass: '123456',  // Change if needed
            ws: 'wss://sip2sip.info:443/ws'
        };

        const STUN_SERVERS = [
            'stun.l.google.com:19302',
            'stun.stunprotocol.org',
            'stun.ipcomms.net:3478'
        ];

        function updateStatus(text, type) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status ' + type;
        }

        async function connectSIP() {
            updateStatus('Connecting to SIP2SIP...', 'calling');
            
            const config = {
                uri: `sip:${SIP_CONFIG.user}@${SIP_CONFIG.server}`,
                authorizationUser: SIP_CONFIG.user,
                password: SIP_CONFIG.pass,
                transportOptions: { 
                    wsServers: [SIP_CONFIG.ws || `wss://${SIP_CONFIG.server}:443`]
                },
                userAgentString: 'RealSpoof/1.0',
                sessionDescriptionHandlerOptions: {
                    constraints: {
                        audio: true,
                        video: false
                    },
                    iceGatheringTimeout: 5000
                },
                iceServers: STUN_SERVERS.map(s => ({ urls: `stun:${s}` }))
            };

            try {
                ua = new SIP.UA(config);
                
                ua.on('registered', () => {
                    document.getElementById('sipUser').textContent = SIP_CONFIG.user;
                    document.getElementById('account').style.display = 'block';
                    document.getElementById('callBtn').disabled = false;
                    updateStatus('✅ SIP Connected! Ready to spoof.', 'success');
                });
                
                ua.on('unregistered', () => updateStatus('❌ SIP Disconnected', 'error'));
                ua.on('transportError', (e) => updateStatus('❌ Transport Error: ' + e, 'error'));
                
                ua.start();
                
            } catch(e) {
                updateStatus('❌ SIP Error: ' + e.message, 'error');
            }
        }

        async function makeCall() {
            const targetNum = document.getElementById('targetID').value;
            const spoofNum = document.getElementById('spoofID').value;
            
            if (!targetNum) return updateStatus('Enter target number!', 'error');
            
            document.getElementById('callBtn').disabled = true;
            document.getElementById('endBtn').disabled = false;
            updateStatus('📞 Making spoof call...', 'calling');
            
            const target = SIP.UserAgent.makeURI(`sip:${targetNum}@sip2sip.info`);
            const options = {
                params: {
                    from_displayName: 'Spoofed Call',
                    from_user: spoofNum.replace(/\D/g,'')  // Clean number
                },
                sessionDescriptionHandlerOptions: {
                    constraints: { audio: true, video: false }
                }
            };
            
            try {
                session = ua.invite(target, options);
                
                session.on('progress', () => updateStatus('📞 Ringing...', 'calling'));
                session.on('accepted', () => updateStatus('✅ CALL CONNECTED! Talking...', 'success'));
                session.on('failed', (e) => {
                    updateStatus('❌ Call Failed: ' + (e.cause || 'No answer'), 'error');
                    document.getElementById('callBtn').disabled = false;
                });
                session.on('ended', () => {
                    updateStatus('📞 Call Ended', '');
                    document.getElementById('callBtn').disabled = false;
                    document.getElementById('endBtn').disabled = true;
                });
                
            } catch(e) {
                updateStatus('❌ Invite Error: ' + e.message, 'error');
                document.getElementById('callBtn').disabled = false;
            }
        }

        function endCall() {
            if (session) session.bye();
            updateStatus('📞 Ending call...', 'calling');
        }

        // Auto-reconnect
        setInterval(() => {
            if (ua && !ua.isRegistered()) connectSIP();
        }, 30000);
    </script>
</body>
</html>
